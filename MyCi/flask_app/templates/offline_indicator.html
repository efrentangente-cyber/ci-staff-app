<!-- OFFLINE STATUS INDICATOR - Real-time Connection & Sync Status -->
<!-- ═══════════════════════════════════════════════════════════════════ -->

<div id="offlineStatusBanner" class="offline-status-banner status-online">
    🟢 ONLINE - All data synced
</div>

<div id="storageStatusWidget" class="storage-status-widget">
    <button class="btn btn-sm btn-outline-secondary" onclick="toggleStorageDetails()">
        <i class="bi bi-database"></i>
        <span id="storageQuickStatus">Loading...</span>
    </button>
</div>

<div id="storageDetailsPanel" class="storage-details-panel" style="display: none;">
    <div class="storage-details-header">
        <h6><i class="bi bi-database"></i> Storage Status</h6>
        <button class="btn-close btn-sm" onclick="toggleStorageDetails()"></button>
    </div>
    <div class="storage-details-body">
        <div class="storage-stat">
            <span class="storage-label">Applications Downloaded:</span>
            <span class="storage-value" id="appsCount">0</span>
        </div>
        <div class="storage-stat">
            <span class="storage-label">Pending Uploads:</span>
            <span class="storage-value text-warning" id="pendingCount">0</span>
        </div>
        <div class="storage-stat">
            <span class="storage-label">Storage Used:</span>
            <span class="storage-value" id="storageUsed">0 MB</span>
        </div>
        <div class="storage-progress">
            <div class="progress">
                <div id="storageProgressBar" class="progress-bar" role="progressbar" style="width: 0%"></div>
            </div>
            <small class="text-muted" id="storagePercent">0% of quota</small>
        </div>
        <div class="storage-actions">
            <button class="btn btn-sm btn-primary w-100 mb-2" onclick="manualSync()" id="syncNowBtn">
                <i class="bi bi-arrow-repeat"></i> Sync Now
            </button>
            <button class="btn btn-sm btn-success w-100" onclick="downloadAllApps()" id="downloadAllBtn">
                <i class="bi bi-download"></i> Download All
            </button>
        </div>
    </div>
</div>

<style>
    /* Status Banner */
    .offline-status-banner {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 9998;
        padding: 8px 15px;
        text-align: center;
        font-weight: 600;
        font-size: 13px;
        transition: all 0.3s ease;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .status-online {
        background: #10b981;
        color: white;
    }

    .status-offline {
        background: #ef4444;
        color: white;
    }

    .status-syncing {
        background: #f59e0b;
        color: white;
        animation: pulse 1.5s ease-in-out infinite;
    }

    .status-downloading {
        background: #3b82f6;
        color: white;
        animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
    }

    /* Storage Widget */
    .storage-status-widget {
        position: fixed;
        top: 50px;
        right: 20px;
        z-index: 9997;
    }

    .storage-status-widget .btn {
        background: white;
        border: 1px solid #e5e7eb;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .storage-status-widget .btn:hover {
        background: #f9fafb;
    }

    /* Storage Details Panel */
    .storage-details-panel {
        position: fixed;
        top: 90px;
        right: 20px;
        width: 320px;
        background: white;
        border-radius: 10px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        z-index: 9996;
        animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .storage-details-header {
        padding: 15px;
        border-bottom: 1px solid #e5e7eb;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .storage-details-header h6 {
        margin: 0;
        color: #1e3a5f;
        font-size: 14px;
        font-weight: 600;
    }

    .storage-details-body {
        padding: 15px;
    }

    .storage-stat {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid #f3f4f6;
    }

    .storage-stat:last-of-type {
        border-bottom: none;
    }

    .storage-label {
        font-size: 13px;
        color: #6b7280;
    }

    .storage-value {
        font-size: 13px;
        font-weight: 600;
        color: #1e3a5f;
    }

    .storage-progress {
        margin: 15px 0;
    }

    .storage-progress .progress {
        height: 8px;
        border-radius: 4px;
        background: #e5e7eb;
    }

    .storage-progress .progress-bar {
        background: linear-gradient(90deg, #10b981 0%, #3b82f6 100%);
        transition: width 0.3s ease;
    }

    .storage-progress small {
        display: block;
        margin-top: 5px;
        font-size: 11px;
    }

    .storage-actions {
        margin-top: 15px;
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
        .offline-status-banner {
            font-size: 12px;
            padding: 6px 10px;
        }

        .storage-status-widget {
            top: 40px;
            right: 10px;
        }

        .storage-details-panel {
            top: 75px;
            right: 10px;
            left: 10px;
            width: auto;
        }
    }

    /* Adjust main content padding for banner */
    body {
        padding-top: 40px;
    }

    .main-content {
        padding-top: 20px;
    }
</style>

<script>
    // Toggle storage details panel
    function toggleStorageDetails() {
        const panel = document.getElementById('storageDetailsPanel');
        panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        
        if (panel.style.display === 'block') {
            updateStorageStatus();
        }
    }

    // Update storage status display
    async function updateStorageStatus() {
        try {
            const status = await syncManager.getStatus();

            // Quick status
            document.getElementById('storageQuickStatus').textContent = 
                `${status.applications_count} apps | ${status.pending_uploads} pending`;

            // Detailed status
            document.getElementById('appsCount').textContent = status.applications_count;
            document.getElementById('pendingCount').textContent = status.pending_uploads;
            document.getElementById('storageUsed').textContent = `${status.storage_used_mb} MB`;
            document.getElementById('storagePercent').textContent = `${status.storage_percent}% of quota`;
            
            const progressBar = document.getElementById('storageProgressBar');
            progressBar.style.width = `${status.storage_percent}%`;
            
            // Change color if storage is high
            if (status.storage_percent > 90) {
                progressBar.classList.add('bg-danger');
            } else if (status.storage_percent > 70) {
                progressBar.classList.add('bg-warning');
            } else {
                progressBar.classList.remove('bg-danger', 'bg-warning');
            }

            // Disable buttons if offline
            document.getElementById('syncNowBtn').disabled = !status.online || status.syncing;
            document.getElementById('downloadAllBtn').disabled = !status.online || status.downloading;

        } catch (error) {
            console.error('Error updating storage status:', error);
        }
    }

    // Manual sync trigger
    async function manualSync() {
        if (!syncManager.isOnline) {
            alert('⚠️ Cannot sync while offline');
            return;
        }

        try {
            document.getElementById('syncNowBtn').disabled = true;
            document.getElementById('syncNowBtn').innerHTML = '<i class="bi bi-arrow-repeat spin"></i> Syncing...';
            
            await syncManager.manualSync();

            alert('Synced: pending uploads sent, latest assignments refreshed in offline storage.');
            updateStorageStatus();
            
        } catch (error) {
            alert('❌ Sync failed: ' + error.message);
        } finally {
            document.getElementById('syncNowBtn').disabled = false;
            document.getElementById('syncNowBtn').innerHTML = '<i class="bi bi-arrow-repeat"></i> Sync Now';
        }
    }

    // Download all applications
    async function downloadAllApps() {
        if (!syncManager.isOnline) {
            alert('⚠️ Cannot download while offline');
            return;
        }

        try {
            const btn = document.getElementById('downloadAllBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="bi bi-download spin"></i> Downloading...';
            
            const result = await syncManager.downloadAllApplications((current, total) => {
                btn.innerHTML = `<i class="bi bi-download"></i> ${current}/${total}`;
            });
            
            alert(`✅ Downloaded ${result.success} applications successfully!`);
            updateStorageStatus();
            
            // Reload page to show new apps
            if (result.success > 0) {
                location.reload();
            }
            
        } catch (error) {
            alert(
                '❌ Download failed: ' +
                    (error && error.message ? error.message : error) +
                    '\n\nIf you see 502 Bad Gateway, wait a minute and try again, or check Render → Logs.'
            );
        } finally {
            const btn = document.getElementById('downloadAllBtn');
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-download"></i> Download All';
        }
    }

    // Update status every 5 seconds
    setInterval(updateStorageStatus, 5000);

    // Initial update
    document.addEventListener('DOMContentLoaded', () => {
        setTimeout(updateStorageStatus, 1000);
    });

    // Add spin animation for loading icons
    const style = document.createElement('style');
    style.textContent = `
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .spin {
            animation: spin 1s linear infinite;
            display: inline-block;
        }
    `;
    document.head.appendChild(style);
</script>
