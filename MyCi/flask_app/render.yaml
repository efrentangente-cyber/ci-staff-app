services:
  - type: web
    name: dccco-ci-system
    env: python
    # Do not run reset_database.py on every deploy — that wipes SQLite and breaks users.
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT --timeout 180 --graceful-timeout 30 --keep-alive 75 --log-level info app:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: False
    disk:
      name: data
      mountPath: /opt/render/project/src
      sizeGB: 1
