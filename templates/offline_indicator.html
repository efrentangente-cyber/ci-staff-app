<!-- Offline / pending-sync only — no "Online" badge when connected -->
<div id="offline-indicator" class="offline-indicator" style="display: none;" hidden></div>

<style>
.offline-indicator {
    position: fixed;
    top: 10px;
    right: 20px;
    z-index: 10000;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 500;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    transition: all 0.3s ease;
}

.offline-indicator.offline {
    background: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
    animation: pulse 2s infinite;
}

.offline-indicator.pending-sync {
    background: #fff3cd;
    color: #856404;
    border: 1px solid #ffc107;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
}

@media (max-width: 768px) {
    .offline-indicator {
        top: 60px;
        right: 10px;
        font-size: 12px;
        padding: 6px 12px;
    }
}

/* Hide on print */
@media print {
    .offline-indicator {
        display: none !important;
    }
}
</style>
<script>
(function () {
  function paintOfflineIndicator() {
    var el = document.getElementById('offline-indicator');
    if (!el) return;
    var pending = typeof window.__dcccoPendingCount === 'number' ? window.__dcccoPendingCount : 0;
    el.classList.remove('pending-sync', 'offline');
    if (!navigator.onLine) {
      el.style.display = '';
      el.removeAttribute('hidden');
      el.classList.add('offline');
      el.innerHTML = '<i class="bi bi-wifi-off"></i> Offline' + (pending > 0 ? ' · ' + pending + ' pending' : '');
      return;
    }
    if (pending > 0) {
      el.style.display = '';
      el.removeAttribute('hidden');
      el.classList.add('pending-sync');
      el.innerHTML = '<i class="bi bi-cloud-arrow-up"></i> ' + pending + ' to sync';
      return;
    }
    el.style.display = 'none';
    el.setAttribute('hidden', '');
    el.innerHTML = '';
  }
  window.__dcccoRepaintOfflineIndicator = paintOfflineIndicator;
  window.addEventListener('dccco-outbox-changed', paintOfflineIndicator);
  window.addEventListener('online', paintOfflineIndicator);
  window.addEventListener('offline', paintOfflineIndicator);
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', paintOfflineIndicator);
  } else {
    paintOfflineIndicator();
  }
})();
</script>
