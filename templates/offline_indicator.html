<!-- Offline Status Indicator Component -->
<div id="offline-indicator" class="offline-indicator online">
    <i class="bi bi-wifi"></i> Online
</div>

<style>
.offline-indicator {
    position: fixed;
    top: 10px;
    right: 20px;
    z-index: 10000;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 500;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    transition: all 0.3s ease;
}

.offline-indicator.online {
    background: #d4edda;
    color: #155724;
    border: 1px solid #c3e6cb;
}

.offline-indicator.offline {
    background: #f8d7da;
    color: #721c24;
    border: 1px solid #f5c6cb;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
}

@media (max-width: 768px) {
    .offline-indicator {
        top: 60px;
        right: 10px;
        font-size: 12px;
        padding: 6px 12px;
    }
}

/* Hide on print */
@media print {
    .offline-indicator {
        display: none !important;
    }
}
</style>
