services:
  - type: web
    name: dccco-ci-system
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT app:app --timeout 120 --graceful-timeout 30
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: False
    disk:
      name: data
      mountPath: /opt/render/project/src
      sizeGB: 1
